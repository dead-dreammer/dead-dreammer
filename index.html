<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dalziel Sarkhot — Interactive Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050510;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      color: #fff;
    }

    #canvas-container { width: 100vw; height: 100vh; }

    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,217,255,0.08);
      border: 1px solid rgba(0,217,255,0.3);
      color: rgba(255,255,255,0.7);
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #panel {
      position: fixed;
      top: 50%;
      right: -480px;
      transform: translateY(-50%);
      width: 420px;
      background: rgba(5, 5, 20, 0.92);
      border: 1px solid rgba(0,217,255,0.4);
      border-radius: 16px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
      box-shadow: 0 0 60px rgba(0,217,255,0.1);
    }

    #panel.open { right: 32px; }

    #panel-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    #panel-title {
      font-size: 22px;
      font-weight: 700;
      color: #00d9ff;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    #panel-subtitle {
      font-size: 12px;
      color: rgba(0,217,255,0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    #panel-body {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.8);
    }

    #panel-body .tag {
      display: inline-block;
      background: rgba(0,217,255,0.1);
      border: 1px solid rgba(0,217,255,0.3);
      color: #00d9ff;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin: 3px 2px;
    }

    #close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    #close:hover { color: #00d9ff; }

    #name-tag {
      position: fixed;
      top: 32px;
      left: 40px;
    }
    #name-tag h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #00d9ff, #7b5ea7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #name-tag p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="name-tag">
  <h1>Dalziel Sarkhot</h1>
  <p>Click a piece to explore</p>
</div>

<div id="hint">🖱 Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click a piece to learn more</div>

<div id="panel">
  <button id="close">✕</button>
  <div id="panel-icon"></div>
  <div id="panel-title"></div>
  <div id="panel-subtitle"></div>
  <div id="panel-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PIECES_DATA = {
  king: {
    icon: '👑',
    title: 'Dalziel Sarkhot',
    subtitle: 'About Me',
    body: `<p>Hey! I'm Dalziel — a passionate developer who loves building things that live at the intersection of design and engineering.</p><br>
           <p>I believe great software is equal parts craft and creativity. When I'm not coding, I'm probably exploring new tech, gaming, or thinking up the next big idea.</p><br>
           <p><strong style="color:#00d9ff">Alias:</strong> dead-dreammer</p>`
  },
  queen: {
    icon: '⚡',
    title: 'Skills',
    subtitle: 'Tech Stack',
    body: `<p><strong style="color:#00d9ff">Languages</strong></p>
           <span class="tag">JavaScript</span><span class="tag">TypeScript</span><span class="tag">Python</span><br><br>
           <p><strong style="color:#00d9ff">Frontend</strong></p>
           <span class="tag">React</span><span class="tag">Three.js</span><span class="tag">HTML/CSS</span><br><br>
           <p><strong style="color:#00d9ff">Backend & Tools</strong></p>
           <span class="tag">Node.js</span><span class="tag">Git</span><span class="tag">Docker</span>`
  },
  bishop1: {
    icon: '🚀',
    title: 'Projects',
    subtitle: 'What I\'ve Built',
    body: `<p>Here are some things I've worked on:</p><br>
           <p>🔹 <strong>This Portfolio</strong> — 3D interactive chess profile built with Three.js</p><br>
           <p>🔹 <strong>More coming soon...</strong> — Always building something new</p><br>
           <p style="color:rgba(255,255,255,0.4); font-size:12px">Check my GitHub for the latest ↓</p>`
  },
  bishop2: {
    icon: '🎯',
    title: 'Experience',
    subtitle: 'My Journey',
    body: `<p>I've been on a journey of continuous learning and building — from first lines of code to shipping real products.</p><br>
           <p>🔹 Self-taught developer with a passion for problem solving</p><br>
           <p>🔹 Building full-stack applications</p><br>
           <p>🔹 Always levelling up 📈</p>`
  },
  knight1: {
    icon: '💡',
    title: 'Currently Learning',
    subtitle: 'Growth Mode',
    body: `<p>I'm always in learning mode. Right now I'm deep in:</p><br>
           <span class="tag">Cloud Architecture</span><span class="tag">AI / ML</span><span class="tag">Three.js</span><span class="tag">System Design</span><br><br>
           <p>I believe the best developers never stop being students.</p>`
  },
  knight2: {
    icon: '🎮',
    title: 'Interests',
    subtitle: 'Beyond the Code',
    body: `<p>When I step away from the keyboard:</p><br>
           <p>🎮 Gaming — strategy & open world</p><br>
           <p>🎵 Music — always need a good playlist to code to</p><br>
           <p>🌍 Exploring new ideas, cultures, and perspectives</p><br>
           <p>♟️ Chess — obviously 😄</p>`
  },
  rook1: {
    icon: '📬',
    title: 'Contact',
    subtitle: 'Get In Touch',
    body: `<p>Want to collaborate, chat, or just say hi?</p><br>
           <p>📧 <a href="mailto:dalziel.sarkhot94@gmail.com" style="color:#00d9ff">dalziel.sarkhot94@gmail.com</a></p><br>
           <p>🐙 <a href="https://github.com/dead-dreammer" target="_blank" style="color:#00d9ff">github.com/dead-dreammer</a></p><br>
           <p style="color:rgba(255,255,255,0.5); font-size:12px">I'm always open to interesting projects and conversations.</p>`
  },
  rook2: {
    icon: '🔗',
    title: 'Links',
    subtitle: 'Find Me Online',
    body: `<p>🐙 <a href="https://github.com/dead-dreammer" target="_blank" style="color:#00d9ff">GitHub</a> — where the code lives</p><br>
           <p>💼 <a href="https://linkedin.com/in/dalziel-sarkhot" target="_blank" style="color:#00d9ff">LinkedIn</a> — professional side</p><br>
           <p>More links coming soon...</p>`
  }
};

// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.018);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x334466, 5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x00d9ff, 5);
dirLight.position.set(5, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

const purpleLight = new THREE.PointLight(0x7b5ea7, 6, 30);
purpleLight.position.set(-6, 4, -6);
scene.add(purpleLight);

const cyanLight = new THREE.PointLight(0x00d9ff, 5, 30);
cyanLight.position.set(6, 3, 6);
scene.add(cyanLight);

// Board
const boardGroup = new THREE.Group();
scene.add(boardGroup);

const lightMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3e, roughness: 0.3, metalness: 0.8 });
const darkMat  = new THREE.MeshStandardMaterial({ color: 0x05050f, roughness: 0.4, metalness: 0.6 });
const borderMat = new THREE.MeshStandardMaterial({ color: 0x0a0a1a, roughness: 0.2, metalness: 0.9 });

// Board border
const borderGeo = new THREE.BoxGeometry(10.4, 0.25, 10.4);
const border = new THREE.Mesh(borderGeo, borderMat);
border.position.y = -0.13;
border.receiveShadow = true;
boardGroup.add(border);

// Tiles
for (let r = 0; r < 8; r++) {
  for (let c = 0; c < 8; c++) {
    const geo = new THREE.BoxGeometry(1.2, 0.15, 1.2);
    const mat = (r + c) % 2 === 0 ? lightMat : darkMat;
    const tile = new THREE.Mesh(geo, mat);
    tile.position.set((c - 3.5) * 1.25, 0, (r - 3.5) * 1.25);
    tile.receiveShadow = true;
    boardGroup.add(tile);
  }
}

// Glowing edge lines
const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(10, 0.02, 10));
const edgeMat = new THREE.LineBasicMaterial({ color: 0x00d9ff, transparent: true, opacity: 0.3 });
const edges = new THREE.LineSegments(edgeGeo, edgeMat);
edges.position.y = 0.08;
boardGroup.add(edges);

// Chess piece factory
function makePiece(type, color, x, z, dataKey) {
  const group = new THREE.Group();
  group.userData.dataKey = dataKey;
  group.userData.clickable = true;

  const isLight = color === 'light';
  const baseMat = new THREE.MeshStandardMaterial({
    color: isLight ? 0xd4d4ff : 0x1a0a2e,
    roughness: 0.2,
    metalness: 0.8,
    emissive: isLight ? 0x2222ff : 0x330066,
    emissiveIntensity: 0.2
  });

  // Base
  const baseGeo = new THREE.CylinderGeometry(0.38, 0.45, 0.18, 32);
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.castShadow = true;
  group.add(base);

  // Stem
  let stemH = 0.4;
  if (type === 'king') stemH = 0.7;
  if (type === 'queen') stemH = 0.6;
  if (type === 'bishop') stemH = 0.55;

  const stemGeo = new THREE.CylinderGeometry(0.14, 0.3, stemH, 32);
  const stem = new THREE.Mesh(stemGeo, baseMat);
  stem.position.y = 0.09 + stemH / 2;
  stem.castShadow = true;
  group.add(stem);

  // Head
  let head;
  if (type === 'king') {
    const g = new THREE.CylinderGeometry(0.28, 0.22, 0.32, 32);
    head = new THREE.Mesh(g, baseMat);
    head.position.y = 0.09 + stemH + 0.16;
    group.add(head);
    // Cross
    const crossH = new THREE.BoxGeometry(0.26, 0.06, 0.06);
    const crossV = new THREE.BoxGeometry(0.06, 0.22, 0.06);
    const ch = new THREE.Mesh(crossH, baseMat);
    const cv = new THREE.Mesh(crossV, baseMat);
    ch.position.y = head.position.y + 0.24;
    cv.position.y = head.position.y + 0.24;
    group.add(ch); group.add(cv);
  } else if (type === 'queen') {
    const g = new THREE.SphereGeometry(0.26, 32, 32);
    head = new THREE.Mesh(g, baseMat);
    head.position.y = 0.09 + stemH + 0.26;
    group.add(head);
    // Crown spikes
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2;
      const sg = new THREE.ConeGeometry(0.055, 0.22, 8);
      const spike = new THREE.Mesh(sg, baseMat);
      spike.position.set(Math.cos(angle) * 0.18, head.position.y + 0.28, Math.sin(angle) * 0.18);
      group.add(spike);
    }
  } else if (type === 'bishop') {
    const g = new THREE.SphereGeometry(0.22, 32, 32);
    head = new THREE.Mesh(g, baseMat);
    head.position.y = 0.09 + stemH + 0.22;
    group.add(head);
    const tipG = new THREE.ConeGeometry(0.06, 0.25, 8);
    const tip = new THREE.Mesh(tipG, baseMat);
    tip.position.y = head.position.y + 0.35;
    group.add(tip);
  } else if (type === 'knight') {
    const g = new THREE.BoxGeometry(0.28, 0.38, 0.22);
    head = new THREE.Mesh(g, baseMat);
    head.position.y = 0.09 + stemH + 0.19;
    head.rotation.y = Math.PI / 6;
    group.add(head);
    const noseG = new THREE.BoxGeometry(0.14, 0.12, 0.32);
    const nose = new THREE.Mesh(noseG, baseMat);
    nose.position.set(0, head.position.y - 0.06, 0.18);
    group.add(nose);
  } else if (type === 'rook') {
    const g = new THREE.CylinderGeometry(0.28, 0.28, 0.28, 32);
    head = new THREE.Mesh(g, baseMat);
    head.position.y = 0.09 + stemH + 0.14;
    group.add(head);
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2;
      const mg = new THREE.BoxGeometry(0.14, 0.18, 0.14);
      const merlon = new THREE.Mesh(mg, baseMat);
      merlon.position.set(Math.cos(angle) * 0.2, head.position.y + 0.23, Math.sin(angle) * 0.2);
      group.add(merlon);
    }
  }

  // Glow ring
  const ringGeo = new THREE.TorusGeometry(0.44, 0.025, 8, 32);
  const ringMat = new THREE.MeshStandardMaterial({
    color: isLight ? 0x00d9ff : 0x7b5ea7,
    emissive: isLight ? 0x00d9ff : 0x7b5ea7,
    emissiveIntensity: 1.5,
    roughness: 0,
    metalness: 1
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.01;
  group.add(ring);

  group.position.set(x, 0.09, z);
  group.userData.baseY = 0.09;
  boardGroup.add(group);
  return group;
}

const S = 1.25;
const pieces = [];

// Place pieces
pieces.push(makePiece('king',   'light', 0,     -3.5*S, 'king'));
pieces.push(makePiece('queen',  'light', -S,    -3.5*S, 'queen'));
pieces.push(makePiece('bishop', 'light', -2*S,  -2.5*S, 'bishop1'));
pieces.push(makePiece('bishop', 'dark',   2*S,  -2.5*S, 'bishop2'));
pieces.push(makePiece('knight', 'light', -3*S,  -1.5*S, 'knight1'));
pieces.push(makePiece('knight', 'dark',   3*S,  -1.5*S, 'knight2'));
pieces.push(makePiece('rook',   'light', -3.5*S, 3.5*S, 'rook1'));
pieces.push(makePiece('rook',   'dark',   3.5*S, 3.5*S, 'rook2'));

// Orbit controls (manual)
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 3.5, radius: 18 };

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.2, Math.min(Math.PI / 2.2, spherical.phi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('wheel', e => {
  spherical.radius = Math.max(8, Math.min(30, spherical.radius + e.deltaY * 0.03));
});

// Raycasting for clicks
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', e => {
  if (Math.abs(e.clientX - prevMouse.x) > 3) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const allMeshes = [];
  pieces.forEach(p => p.traverse(c => { if (c.isMesh) { c.userData.pieceGroup = p; allMeshes.push(c); } }));
  const hits = raycaster.intersectObjects(allMeshes);
  if (hits.length > 0) {
    const group = hits[0].object.userData.pieceGroup;
    if (group && group.userData.dataKey) openPanel(group.userData.dataKey, group);
  }
});

let selectedPiece = null;
function openPanel(key, group) {
  const data = PIECES_DATA[key];
  if (!data) return;
  document.getElementById('panel-icon').textContent = data.icon;
  document.getElementById('panel-title').textContent = data.title;
  document.getElementById('panel-subtitle').textContent = data.subtitle;
  document.getElementById('panel-body').innerHTML = data.body;
  document.getElementById('panel').classList.add('open');
  if (selectedPiece) selectedPiece.userData.selected = false;
  selectedPiece = group;
  group.userData.selected = true;
}

document.getElementById('close').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('open');
  if (selectedPiece) { selectedPiece.userData.selected = false; selectedPiece = null; }
});

// Hover effect
let hoveredPiece = null;
renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const allMeshes = [];
  pieces.forEach(p => p.traverse(c => { if (c.isMesh) { c.userData.pieceGroup = p; allMeshes.push(c); } }));
  const hits = raycaster.intersectObjects(allMeshes);
  const hit = hits.length > 0 ? hits[0].object.userData.pieceGroup : null;
  if (hoveredPiece !== hit) {
    hoveredPiece = hit;
    renderer.domElement.style.cursor = hit ? 'pointer' : 'grab';
  }
});

// Animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Camera orbit
  camera.position.x = Math.sin(spherical.theta) * Math.sin(spherical.phi) * spherical.radius;
  camera.position.y = Math.cos(spherical.phi) * spherical.radius;
  camera.position.z = Math.cos(spherical.theta) * Math.sin(spherical.phi) * spherical.radius;
  camera.lookAt(0, 1, 0);

  // Animate pieces
  pieces.forEach((p, i) => {
    const isHovered = p === hoveredPiece;
    const isSelected = p.userData.selected;
    const baseY = p.userData.baseY;
    const targetY = isSelected ? baseY + 1.2 : isHovered ? baseY + 0.4 : baseY + Math.sin(t * 0.8 + i * 0.9) * 0.06;
    p.position.y += (targetY - p.position.y) * 0.1;
    p.rotation.y += isSelected ? 0.02 : isHovered ? 0.01 : 0.003;
  });

  // Pulse lights
  purpleLight.intensity = 2.5 + Math.sin(t * 1.2) * 0.8;
  cyanLight.intensity   = 2.0 + Math.sin(t * 0.9 + 1) * 0.8;
  edgeMat.opacity       = 0.2 + Math.sin(t * 1.5) * 0.1;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
